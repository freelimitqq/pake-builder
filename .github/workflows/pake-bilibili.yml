name: Build Pake App (Windows)
on:
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install pake-cli
        run: pnpm install -g pake-cli
      - name: Build with Pake
        run: |
          pake https://www.bilibili.com `
            --name bilibili `
            --width 1280 `
            --height 800 `
            --domain "bilibili.com,bilivideo.com,hdslb.com"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilibili-windows
          path: |
            *.exe
            *.msi
          if-no-files-found: warn
